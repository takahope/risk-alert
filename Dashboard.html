<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資安預警即時儀表板</title>
    <style>
      :root {
        --primary-color: #1a73e8;
        --danger-color: #d93025;
        --success-color: #188038;
        --bg-color: #f8f9fa;
        --card-bg: #ffffff;
      }
      
      body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        color: #333;
        margin: 0;
        padding: 20px;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0 0 10px 0;
        font-size: 24px;
        color: #202124;
      }

      /* 設定區塊樣式 */
      .settings-panel {
        background: #fff;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(60,64,67,0.3);
        margin-bottom: 20px;
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between; /* 讓掃描按鈕靠右 */
      }

      .switches-container {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      .setting-item {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 500;
      }

      /* Scan Button Style */
      .btn-scan {
        background-color: var(--primary-color);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .btn-scan:hover {
        background-color: #1557b0;
      }

      .btn-scan:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }

      /* Toggle Switch CSS */
      .switch {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 20px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: .4s;
        border-radius: 34px;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 2px;
        bottom: 2px;
        background-color: white;
        transition: .4s;
        border-radius: 50%;
      }

      input:checked + .slider {
        background-color: var(--primary-color);
      }

      input:checked + .slider:before {
        transform: translateX(20px);
      }

      /* 表格樣式 */
      .card {
        background: var(--card-bg);
        border-radius: 8px;
        box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3);
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th, td {
        padding: 12px 16px;
        text-align: left;
        border-bottom: 1px solid #e0e0e0;
      }

      th {
        background-color: #f1f3f4;
        font-weight: 600;
        color: #5f6368;
        font-size: 13px;
      }

      .tag {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
      }

      .tag-alert { background-color: #fce8e6; color: var(--danger-color); }
      .tag-safe { background-color: #e6f4ea; color: var(--success-color); }
      .tag-error { background-color: #333; color: #fff; }

      .status-bar {
        font-size: 12px;
        color: #666;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🛡️ 資安預警控制台</h1>
        <div class="status-bar">
          最後更新: <span id="last-updated">--:--:--</span>
          <button onclick="refreshAll()" style="margin-left:5px; cursor:pointer; border:none; background:none; color:blue;">⟳</button>
        </div>
      </header>

      <!-- 新增：功能開關控制面板 -->
      <div class="settings-panel">
        <div class="switches-container">
          <div class="setting-item">
            <label class="switch">
              <input type="checkbox" id="toggle-scanRead" onchange="updateSetting('scanRead')">
              <span class="slider"></span>
            </label>
            <span>掃描已讀信件 (A2)</span>
          </div>
          <div class="setting-item">
            <label class="switch">
              <input type="checkbox" id="toggle-autoDraft" onchange="updateSetting('autoDraft')">
              <span class="slider"></span>
            </label>
            <span>開啟自動草稿 (B2)</span>
          </div>
          <div class="setting-item">
            <label class="switch">
              <input type="checkbox" id="toggle-chatNotify" onchange="updateSetting('chatNotify')">
              <span class="slider"></span>
            </label>
            <span>開啟 Chat 通知 (C2)</span>
          </div>
        </div>
        
        <!-- 新增：立即掃描按鈕 -->
        <div>
          <button id="btn-scan" class="btn-scan" onclick="triggerScan()">
            🚀 立即掃描信件
          </button>
        </div>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr>
              <!-- [修改] 新增 # 編號欄位 -->
              <th width="5%">#</th>
              <th width="10%">時間</th>
              <th width="15%">信件時間</th>
              <th width="10%">狀態</th>
              <th width="35%">警訊名稱</th>
              <th width="25%">命中資產 / 處理結果</th>
            </tr>
          </thead>
          <tbody id="data-body">
            <!-- [修改] colspan 改為 6 -->
            <tr><td colspan="6" style="text-align:center; padding:20px;">資料載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      window.onload = refreshAll;
      // 每 30 秒自動更新數據 (不頻繁更新設定，以免干擾操作)
      setInterval(loadData, 30000);

      function refreshAll() {
        loadSettings();
        loadData();
      }

      function loadSettings() {
        google.script.run.withSuccessHandler(function(settings) {
          document.getElementById('toggle-scanRead').checked = settings.scanRead;
          document.getElementById('toggle-autoDraft').checked = settings.autoDraft;
          document.getElementById('toggle-chatNotify').checked = settings.chatNotify;
        }).getSystemSettings();
      }

      function updateSetting(key) {
        const isEnabled = document.getElementById('toggle-' + key).checked;
        google.script.run.withSuccessHandler(function() {
          console.log(key + " updated to " + isEnabled);
        }).updateSystemSetting(key, isEnabled);
      }

      function loadData() {
        const tbody = document.getElementById('data-body');
        const timeSpan = document.getElementById('last-updated');
        
        google.script.run.withSuccessHandler(function(data) {
          renderTable(data);
          const now = new Date();
          timeSpan.textContent = now.toTimeString().split(' ')[0];
        }).getDashboardData();
      }

      function renderTable(data) {
        const tbody = document.getElementById('data-body');
        tbody.innerHTML = '';

        if (!data || data.length === 0) {
          // [修改] colspan 改為 6
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px;">目前尚無紀錄</td></tr>';
          return;
        }

        // [修改] 加入 index 參數
        data.forEach((row, index) => {
          const [time, status, warningName, asset, action, emailDate] = row;
          
          let tagClass = 'tag-safe';
          let statusText = '安全';
          if (status === 'ALERT') { tagClass = 'tag-alert'; statusText = '⚠️ 風險'; }
          else if (status === 'ERROR') { tagClass = 'tag-error'; statusText = '錯誤'; }

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${index + 1}</td> <!-- [修改] 顯示項目編號 -->
            <td>${time}</td>
            <td>${emailDate || '-'}</td> <!-- [修改] 顯示信件時間 -->
            <td><span class="tag ${tagClass}">${statusText}</span></td>
            <td>${warningName}</td>
            <td><strong>${asset}</strong><br><small style="color:#666">${action}</small></td>
          `;
          tbody.appendChild(tr);
        });
      }

      // 新增：觸發後端掃描功能
      function triggerScan() {
        const btn = document.getElementById('btn-scan');
        const originalText = btn.innerHTML;
        
        // Disable button to prevent double clicks
        btn.disabled = true;
        btn.innerHTML = '⏳ 掃描中...';

        google.script.run
          .withSuccessHandler(function(result) {
            btn.innerHTML = '✅ 掃描完成';
            // 2秒後恢復按鈕
            setTimeout(() => { 
              btn.innerHTML = originalText; 
              btn.disabled = false; 
            }, 2000);
            
            // 立即刷新表格資料
            loadData();
          })
          .withFailureHandler(function(err) {
            btn.innerHTML = '❌ 錯誤';
            alert('執行失敗: ' + err.message);
            btn.disabled = false;
            setTimeout(() => { btn.innerHTML = originalText; }, 2000);
          })
          .processIncomingEmails();
      }
    </script>
  </body>
</html>
